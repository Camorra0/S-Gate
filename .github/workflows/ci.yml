name: CI/CD DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]

stages:
  - build
  - test
  - security
  - staging
  - production

build:
  stage: build
  script:
    - echo "Building application..."

test:
  stage: test
  script:
    - echo "Running tests..."

security-scan:
  stage: security
  script:
    - echo "Running security scan..."

deploy-staging:
  stage: staging
  script:
    - echo "Deploying to staging..."

deploy-production:
  stage: production
  script:
    - echo "Deploying to production..."
