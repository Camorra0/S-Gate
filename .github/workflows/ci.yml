name: CI/CD Secure Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
      - name: Build
        run: echo "✅ Build stage complete"

  test:
    runs-on: self-hosted
    needs: build
    steps:
      - uses: actions/checkout@v3
      - name: Run Tests
        run: echo "✅ Tests passed"

  security-scan:
    runs-on: self-hosted
    needs: test
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: pip3 install minio --break-system-packages

      - name: Run ZAP Scan
        run: python3 ${{ github.workspace }}/scripts/zap_scan.py

      - name: AI Analysis with Mistral
        run: python3 ${{ github.workspace }}/scripts/llm_agent.py

      - name: Check Policy
        run: python3 ${{ github.workspace }}/scripts/policy.py

      - name: Generate HTML Report
        run: python3 ${{ github.workspace }}/scripts/generate_report.py

      - name: Upload Report to MinIO
        run: python3 ${{ github.workspace }}/scripts/minio_upload.py

      - name: Compare Vulnerability History
        run: python3 ${{ github.workspace }}/scripts/history.py

      - name: Upload Reports as Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report
          path: /home/server/devsecops-project/reports/

  deploy-staging:
    runs-on: self-hosted
    needs: security-scan
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to Staging
        run: |
          echo "✅ Deploying to staging..."
          docker rm -f dvwa-staging 2>/dev/null || true
          docker stop dvwa-lab 2>/dev/null || true
          docker rm dvwa-lab 2>/dev/null || true
          docker run -d --name dvwa-staging -p 9000:80 vulnerables/web-dvwa

  deploy-production:
    runs-on: self-hosted
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to Production
        run: |
          echo "✅ Deploying to production..."
          docker rm -f dvwa-prod 2>/dev/null || true
          docker run -d --name dvwa-prod -p 80:80 vulnerables/web-dvwa
